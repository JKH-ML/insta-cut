<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract Frames from Video | Online Video Editor</title>
    <meta name="description" content="Extract all frames or specific FPS frames from your MP4 video directly in the browser. High quality PNG extraction.">
    <script src="coi-serviceworker.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="i18n.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .frames-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .frame-item {
            position: relative;
            aspect-ratio: 16/9;
            background: #27272a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #3f3f46;
        }
        .frame-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .frame-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            text-align: center;
        }
        .download-btn-mini {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(99, 102, 241, 0.8);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 2px 5px;
            font-size: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="header-left">
                    <a href="index.html" class="btn-home" title="Home">🏠</a>
                    <h1 data-i18n="title">Video Editor</h1>
                </div>
                <div class="header-right">
                    <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">🌓</button>
                    <select id="lang-selector" class="lang-selector">
                        <option value="ko">한국어</option>
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                        <option value="ja">日本語</option>
                    </select>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link" data-i18n="trim">Trim</a>
                <a href="crop.html" class="nav-link" data-i18n="crop">Crop</a>
                <a href="merge.html" class="nav-link" data-i18n="merge">Merge</a>
                <a href="sync.html" class="nav-link" data-i18n="sync">Sync</a>
                <a href="frames.html" class="nav-link active" data-i18n="frames">Frames</a>
            </nav>
            <div id="status" class="status-badge" data-i18n="status_init">FFmpeg initializing...</div>
        </header>
        
        <main>
            <section class="upload-area" id="drop-zone">
                <input type="file" id="uploader" accept="video/mp4" class="hidden">
                <div class="upload-content">
                    <span class="upload-icon">🎞️</span>
                    <p class="upload-label" data-i18n="upload_label_frames">Select Video to Extract Frames</p>
                </div>
            </section>

            <section id="editor-container" class="editor-main hidden">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title" data-i18n="frames_settings_title">Frames Extraction Settings</h3>
                    </div>
                    <div class="card-content">
                        <p style="font-size: 14px; color: #a1a1aa; margin-bottom: 20px;" data-i18n="extracting_msg">Extracting all frames from the video. This may take some time depending on video length.</p>
                        
                        <div class="button-group">
                            <button id="extract-btn" class="btn-primary" data-i18n="extract_btn" style="flex: 1;">Extract All Frames</button>
                        </div>
                    </div>
                </div>

                <!-- Progress -->
                <div id="progress-container" class="progress-section hidden">
                    <div class="progress-info">
                        <span id="progress-text" data-i18n="progress_processing">Processing...</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>

                <!-- Results -->
                <div class="card" style="margin-top: 20px;">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h3 class="card-title" data-i18n="extracted_frames_title">Extracted Frames</h3>
                        <button id="download-all-btn" class="btn-secondary hidden" style="height: 28px; padding: 0 10px; font-size: 0.75rem;" data-i18n="download_all_btn">Download All (.zip)</button>
                    </div>
                    <div class="card-content">
                        <div id="frames-container" class="frames-grid">
                            <!-- Frames will be added here -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="frames.js"></script>
</body>
</html>
